name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: mypy strict
        run: uv run mypy --strict src/

  test:
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (with pandapower for CDL cross-solver tests)
        run: uv sync --frozen --dev --extra pandapower

      - name: Unit + E2E tests (no OpenDSS)
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing tests/ -m "not spike"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  smoke-opendss:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (with OpenDSS)
        run: uv sync --frozen --dev --extra opendss

      - name: Run OpenDSS smoke tests (spike)
        run: uv run pytest tests/spike/ tests/e2e/test_opendss_e2e.py -v -m spike

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build gridflow-core image
        run: docker build -f docker/gridflow-core/Dockerfile -t gridflow/gridflow-core:ci .

      - name: Build opendss-connector image
        run: docker build -f docker/opendss-connector/Dockerfile -t gridflow/opendss-connector:ci .

      - name: Build pandapower-connector image
        run: docker build -f docker/pandapower-connector/Dockerfile -t gridflow/pandapower-connector:ci .
