# Stochastic voltage-violation study — condition low (pv_kw=600)
# Sample = 24 random single-PV placements (paired across conditions via seed=100).
sweep:
  id: voltvar_low
  base_pack_id: ieee13-voltvar@1.0.0
  aggregator: statistics
  seed: 42
  n_replicates: 1
axes:
  - name: pv_bus
    type: random_choice
    values: ["671.1.2.3","675.1.2.3","634.1.2.3","645.2.3","646.2.3","611.3","652.1","692.1.2.3","632.1.2.3","680.1.2.3"]
    n_samples: 24
    seed: 100
  - name: pv_kw
    type: choice
    values: [600.0]
  - name: pv_kv
    type: choice
    values: [2.4]
