# MVP try 2 — Stochastic HCA sweep over IEEE 13 (OpenDSS)
#
# 200 random PV placements: bus is sampled uniformly from 10 candidate
# load buses, kW is sampled uniformly in [100, 2000] kW. The two random
# axes share the same n_samples and seed-pair so the resulting (bus, kw)
# tuples are reproducible bit-for-bit.
#
# Smaller-than-spec sample count (200 instead of 500) so the smoke run
# fits the demo budget; the run wrapper script can crank it up to 500
# by editing this file alone — no code change needed.

sweep:
  id: ieee13_stochastic_hca_opendss
  base_pack_id: ieee13_sweep_base@1.0.0
  aggregator: statistics
  seed: 42

axes:
  - name: pv_bus
    type: random_choice
    values:
      - "671.1.2.3"
      - "675.1.2.3"
      - "634.1.2.3"
      - "680.1.2.3"
      - "684.1.3"
      - "611.3"
      - "646.2.3"
      - "645.2"
      - "632.1.2.3"
      - "633.1.2.3"
    n_samples: 200
    seed: 100
  - name: pv_kw
    type: random_uniform
    low: 100.0
    high: 2000.0
    n_samples: 200
    seed: 200
