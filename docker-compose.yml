version: "3.9"

# Production-style compose: builds the slim runtime images and exposes the
# gridflow CLI container on port 8888. See docker-compose.dev.yml for the
# developer variant that bind-mounts the source tree for hot reload.

services:
  gridflow-core:
    build:
      context: .
      dockerfile: docker/gridflow-core/Dockerfile
    image: gridflow/gridflow-core:latest
    container_name: gridflow-core
    ports:
      - "8888:8888"
    networks:
      - gridflow-net
    volumes:
      - shared-data:/app/data
      - ./examples:/app/examples:ro
      - gridflow-home:/home/gridflow/.gridflow
    environment:
      - GRIDFLOW_ENV=production
      - GRIDFLOW_LOG_LEVEL=INFO
      - GRIDFLOW_HOME=/home/gridflow/.gridflow
    depends_on:
      opendss-connector:
        condition: service_healthy
    restart: unless-stopped

  opendss-connector:
    build:
      context: .
      dockerfile: docker/opendss-connector/Dockerfile
    image: gridflow/opendss-connector:latest
    container_name: opendss-connector
    networks:
      - gridflow-net
    # Port 8000 is internal-only (REST API consumed by gridflow-core via
    # the internal Docker network per detailed design §11.2). Not exposed
    # to the host.
    volumes:
      - shared-data:/app/data
      - ./examples:/app/examples:ro
    environment:
      - GRIDFLOW_ENV=production
      - GRIDFLOW_LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  gridflow-net:
    driver: bridge

volumes:
  shared-data:
    driver: local
  gridflow-home:
    driver: local
